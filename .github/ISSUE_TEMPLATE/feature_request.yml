name: Feature request / idea
description: Suggest a tool, data adapter, metric, probe, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: The problem it solves and who benefits.
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options: [data adapter, tool, metric/modality, backend, eval/probe, docs, other]
  - type: textarea
    id: context
    attributes:
      label: Alternatives / context
